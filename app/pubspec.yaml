name: kdrama_hangul
description: "Learn Korean with K-drama scenes."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  youtube_player_iframe: ^6.0.2
  flutter_tts: ^4.2.0
  shared_preferences: ^2.3.0
  http: ^1.2.0
  path_provider: ^2.1.0
  google_mobile_ads: ^5.2.0
  firebase_core: ^3.6.0
  firebase_remote_config: ^5.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/icon.png
  adaptive_icon_background: assets/icon/icon_bg.png
  adaptive_icon_foreground: assets/icon/icon_fg.png

flutter:
  uses-material-design: true
  assets:
    - assets/scenes/
